name: Sync to Hugging Face Space

on:
  push:
    branches: [main] # Change to 'master' if your default branch is master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Crucial if you have large files tracked by Git LFS
          
      - name: Exclude ONLY MP4 files from HF deployment
        run: |
          # Configure Git user required for making a local commit in Actions
          git config --global user.name "GitHub Actions Sync"
          git config --global user.email "actions@github.com"
          
          # Find any .mp4 files and remove them from the staging area (does NOT delete them from GitHub)
          find . -type f -name "*.mp4" -exec git rm --cached {} + || true
          
          # Commit the changes locally before pushing
          git commit -m "chore: drop mp4 files for HF deployment" || true
          
      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # Notice we changed 'main' to 'HEAD:main' to push our newly created local commit
        run: git push --force https://harinie4466:$HF_TOKEN@huggingface.co/spaces/harinie4466/micro-soc-gym HEAD:main
