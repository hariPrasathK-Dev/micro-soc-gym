name: Sync to Hugging Face Space

on:
  push:
    branches: [main] # Change to 'master' if your default branch is master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true # Crucial if you have large files tracked by Git LFS
          
      - name: Remove MP4 files before pushing
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          find . -name "*.mp4" -type f -exec git rm --cached {} + || true
          git commit -m "Exclude mp4 files" || true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://harinie4466:$HF_TOKEN@huggingface.co/spaces/harinie4466/micro-soc-gym HEAD:main
