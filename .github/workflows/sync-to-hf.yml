name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 1
          lfs: true

      - name: Sync to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p /tmp/hf_export
          git archive HEAD | tar -x -C /tmp/hf_export

          cd /tmp/hf_export
          git init
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git remote add hf https://harinie4466:$HF_TOKEN@huggingface.co/spaces/harinie4466/micro-soc-gym

          git add .
          git commit -m "Sync from GitHub (excluding media)"

          git push hf HEAD:main --force
